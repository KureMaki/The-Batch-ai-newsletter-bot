name: Weekly Newsletter Automation

on:
  # 每周六早上 10:00 (东京时间 = UTC+9，所以是 UTC 1:00)
  schedule:
    - cron: '0 1 * * 6'
  # 允许手动触发（用于测试）
  workflow_dispatch:
    inputs:
      debug_mode:
        description: '调试模式（跳过 AI 摘要，不消耗 token）'
        required: false
        default: 'false'
      issue_number:
        description: '手动指定期号（留空则自动检测）'
        required: false
        default: ''

jobs:
  newsletter:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Get latest issue number
        id: latest_issue
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: |
          MANUAL="${{ inputs.issue_number }}"
          if [ -n "$MANUAL" ]; then
            echo "📌 使用手动指定期号: $MANUAL"
            echo "issue_number=$MANUAL" >> $GITHUB_OUTPUT
            echo "issue_url=https://www.deeplearning.ai/the-batch/issue-${MANUAL}/" >> $GITHUB_OUTPUT
          else
            python get_latest_issue.py >> $GITHUB_OUTPUT
          fi

      - name: Process newsletter
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          ISSUE_URL: ${{ steps.latest_issue.outputs.issue_url }}
          ISSUE_NUMBER: ${{ steps.latest_issue.outputs.issue_number }}
          DEBUG_MODE: ${{ inputs.debug_mode }}
        run: |
          echo "=== DEBUG INFO ==="
          echo "NOTION_DATABASE_ID length: ${#NOTION_DATABASE_ID}"
          echo "NOTION_TOKEN length: ${#NOTION_TOKEN}"
          echo "DEBUG_MODE: $DEBUG_MODE"

          if [ "$DEBUG_MODE" == "true" ]; then
            echo "=== 调试模式：跳过 AI 摘要 ==="
            python run_debug.py
          else
            echo "=== 正式模式 ==="
            python run_newsletter.py
          fi

      - name: Commit updated last_issue.txt
        if: success()
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add last_issue.txt
          git diff --staged --quiet || git commit -m "chore: update last_issue to ${{ steps.latest_issue.outputs.issue_number }}"
          git push
